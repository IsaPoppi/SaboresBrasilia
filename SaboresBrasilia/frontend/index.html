<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Restaurantes Brasília</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #F7F0E6;
    --terracotta: #C4622D;
    --terracotta-light: #E07848;
    --dark: #1A1208;
    --muted: #8B7355;
    --surface: #FFFDF8;
    --border: #E8DDD0;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--dark);
    color: var(--cream);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  header .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-style: italic;
  }

  header .logo span { color: var(--terracotta-light); }

  header .subtitle {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* CHAT */
  .chat-panel {
    width: 380px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-right: 1px solid var(--border);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-items: flex-end; }
  .message.bot { align-items: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 0.875rem;
    line-height: 1.5;
    max-width: 280px;
    word-wrap: break-word;
  }

  .message.user .bubble {
    background: var(--terracotta);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .message.bot .bubble {
    background: var(--cream);
    color: var(--dark);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .sender-name {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 0 4px;
  }

  .restaurant-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 320px;
  }

  .r-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 3px solid var(--terracotta);
  }

  .r-card:hover {
    background: var(--cream);
    transform: translateX(3px);
    box-shadow: 2px 4px 12px rgba(0,0,0,0.08);
  }

  .r-card-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--dark);
  }

  .r-card-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .r-card-desc { font-size: 0.78rem; color: #555; margin-top: 4px; line-height: 1.4; }

  .tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }

  .tag {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 0.65rem;
    color: var(--muted);
    font-weight: 500;
  }

  .input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    background: var(--surface);
  }

  .input-area input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 0.875rem;
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
  }

  .input-area input:focus { border-color: var(--terracotta); }
  .input-area input::placeholder { color: var(--muted); }

  .send-btn {
    width: 40px;
    height: 40px;
    background: var(--terracotta);
    border: none;
    border-radius: 50%;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--terracotta-light); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }

  /* MAP */
  .map-panel { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  .suggestions {
    padding: 10px 16px 0;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .suggestion-chip {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.73rem;
    cursor: pointer;
    color: var(--dark);
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }

  .suggestion-chip:hover {
    background: var(--terracotta);
    color: white;
    border-color: var(--terracotta);
  }

  .typing-indicator .bubble {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 16px;
  }

  .dot {
    width: 7px;
    height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .leaflet-popup-content-wrapper {
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  .popup-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--dark); }
  .popup-meta { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .popup-desc { font-size: 0.82rem; color: #444; margin-top: 6px; line-height: 1.4; }

  .map-hint {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(26, 18, 8, 0.8);
    color: var(--cream);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.75rem;
    pointer-events: none;
    z-index: 1000;
    backdrop-filter: blur(4px);
    transition: opacity 0.5s;
    white-space: nowrap;
  }

  .error-bubble {
    background: #fff0f0;
    border: 1px solid #ffcccc;
    color: #c0392b;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Sabores de <span>Brasília</span></div>
    <div class="subtitle">Recomendações gastronômicas · Modelo inicial</div>
  </div>
</header>

<div class="app">
  <div class="chat-panel">
    <div class="suggestions" id="suggestions">
      <button class="suggestion-chip" onclick="sendSuggestion(this)">🍕 Pizza</button>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">🥩 Churrasco</button>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">🍣 Japonês</button>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">🌿 Vegetariano</button>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">💑 Jantar romântico</button>
    </div>

    <div class="messages" id="messages">
      <div class="message bot">
        <span class="sender-name">ASSISTENTE</span>
        <div class="bubble">
          Olá! 👋 Me diga o que você está com vontade de comer — culinária, bairro, faixa de preço — e vou te indicar os melhores lugares em Brasília! 🍽️
        </div>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ex: quero um almoço executivo na Asa Sul..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <div class="map-panel">
    <div id="map"></div>
    <div class="map-hint" id="mapHint">🗺️ Os restaurantes recomendados aparecerão no mapa</div>
  </div>
</div>

<script>
  // =============================================
  // CONFIGURAÇÃO — altere apenas aqui
  // =============================================
  const API_URL = "http://localhost:8000/chat"; // URL do backend Python

  // =============================================
  // UTILITÁRIOS
  // =============================================
  function escHtml(str) {
    return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // =============================================
  // MAPA
  // =============================================
  const map = L.map("map").setView([-15.7801, -47.9292], 12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);

  let markers = [];

  function createMarkerIcon(index) {
    return L.divIcon({
      className: "",
      html: `<div style="
        background:#C4622D;color:white;width:30px;height:30px;
        border-radius:50% 50% 50% 0;transform:rotate(-45deg);
        display:flex;align-items:center;justify-content:center;
        font-weight:bold;font-size:12px;
        box-shadow:0 2px 8px rgba(0,0,0,0.3);border:2px solid white;">
        <span style="transform:rotate(45deg)">${index + 1}</span>
      </div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 30],
      popupAnchor: [0, -32],
    });
  }

  function clearMarkers() {
    markers.forEach((m) => map.removeLayer(m));
    markers = [];
  }

  function addRestaurantsToMap(restaurants) {
    clearMarkers();
    const bounds = [];
    restaurants.forEach((r, i) => {
      if (!r.lat || !r.lng) return;
      const marker = L.marker([r.lat, r.lng], { icon: createMarkerIcon(i) }).addTo(map);
      marker.bindPopup(`
        <div style="min-width:180px">
          <div class="popup-name">${i + 1}. ${escHtml(r.name)}</div>
          <div class="popup-meta">${escHtml(r.cuisine)} · ${escHtml(r.priceRange)} · ${escHtml(r.neighborhood)}</div>
          <div class="popup-desc">${escHtml(r.description)}</div>
        </div>`);
      markers.push(marker);
      bounds.push([r.lat, r.lng]);
    });
    if (bounds.length > 0) map.fitBounds(bounds, { padding: [40, 40] });
    document.getElementById("mapHint").style.opacity = "0";
  }

  // =============================================
  // CHAT
  // =============================================
  let conversationHistory = [];

  function addMessage(role, content, restaurants = null) {
    const messagesEl = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `message ${role === "user" ? "user" : "bot"}`;
    div.innerHTML = `<span class="sender-name">${role === "user" ? "VOCÊ" : "ASSISTENTE"}</span>`;

    if (role === "bot" && restaurants && restaurants.length > 0) {
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = content;
      div.appendChild(bubble);

      const cards = document.createElement("div");
      cards.className = "restaurant-cards";
      restaurants.forEach((r, i) => {
        cards.innerHTML += `
          <div class="r-card" onclick="focusRestaurant(${i})">
            <div class="r-card-name">${i + 1}. ${escHtml(r.name)}</div>
            <div class="r-card-meta">${escHtml(r.neighborhood)}</div>
            <div class="r-card-desc">${escHtml(r.description)}</div>
            <div class="tags">
              <span class="tag">${escHtml(r.cuisine)}</span>
              <span class="tag">${escHtml(r.priceRange)}</span>
            </div>
          </div>`;
      });
      div.appendChild(cards);
    } else {
      const bubble = document.createElement("div");
      bubble.className = `bubble ${role === "error" ? "error-bubble" : ""}`;
      bubble.textContent = content;
      div.appendChild(bubble);
    }

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addTypingIndicator() {
    const messagesEl = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "message bot typing-indicator";
    div.id = "typing";
    div.innerHTML = `<span class="sender-name">ASSISTENTE</span>
      <div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTypingIndicator() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  function focusRestaurant(index) {
    if (markers[index]) {
      map.setView(markers[index].getLatLng(), 15, { animate: true });
      markers[index].openPopup();
    }
  }

  async function sendMessage(text = null) {
    const input = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const userText = text || input.value.trim();
    if (!userText) return;
    if (userText.length > 400) {
      addMessage("error", "Mensagem muito longa. Seja mais breve!");
      return;
    }

    input.value = "";
    sendBtn.disabled = true;
    addMessage("user", userText);
    conversationHistory.push({ role: "user", content: userText });
    // Mantém apenas as últimas 20 mensagens para não crescer indefinidamente
    if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-20);
    addTypingIndicator();

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: conversationHistory.slice(-10) }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const detail = err.detail || `Erro ${response.status}`;
        removeTypingIndicator();
        addMessage("error", detail);
        sendBtn.disabled = false;
        input.focus();
        return;
      }

      const data = await response.json();
      removeTypingIndicator();

      addMessage("bot", data.message, data.restaurants);
      addRestaurantsToMap(data.restaurants);

      conversationHistory.push({
        role: "assistant",
        content: JSON.stringify(data),
      });
    } catch (err) {
      removeTypingIndicator();
      addMessage("error", "Erro ao conectar com o servidor. Verifique se o backend está rodando.");
      console.error(err);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function sendSuggestion(btn) {
    sendMessage(btn.textContent.replace(/^[^\w]+/, "").trim());
  }
</script>
</body>
</html>
